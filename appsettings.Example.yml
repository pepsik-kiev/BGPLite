Bgp:
  Asn: 65444
  RouterId: 1.2.3.4
  KeepAlive: 60
  HoldTime: 180

Peers:
  - Address: 10.0.0.1
    RemoteAsn: 65001
    Description: "example-peer"

# RIPEstat (stat.ripe.net) used to resolve ASNs → prefixes via the ris-prefixes endpoint.
# That endpoint is slow for large origin ASes (AS3356/Lumen takes ~2 minutes), so the HTTP
# timeout defaults to 180s and is tunable here. Transient failures (timeout, HTTP 429/5xx)
# are retried with exponential backoff.
RipeStat:
  TimeoutSeconds: 180        # per-request HTTP timeout (default 180)
  RetryAttempts: 2           # retries after a transient failure (default 2, 0 disables)
  RetryDelaySeconds: 2       # base delay between retries, doubled each attempt (default 2)
  # AsnLists:               # pre-warmed ASN groups at startup
  #   - Name: tier1
  #     Description: "Tier-1 transit ASes"
  #     Asns: [3356, 1299]
  #     Community: "65444:200"   # optional "ASN:VALUE" stamped on every prefix advertised from this list
  # A Community (here or on a PrefixSource below) tags advertised prefixes so a peer can filter by origin;
  # lists without a Community are advertised untagged (no behavior change).

# Prefix sources loaded at startup via the provider factory (Kind: file | http).
# "http" fetches any direct raw-file URL (raw.githubusercontent.com, a gist, self-hosted, ...).
# Each source may override the HTTP timeout (Timeout, seconds) and tag a Community in "ASN:VALUE".
# Results are cached in memory (TTL 1h).
PrefixSources:
  - Kind: http
    Name: ru
    Description: "Russia prefixes from a remote list"
    Url: "https://raw.githubusercontent.com/<org>/<repo>/main/ru.txt"
    Timeout: 30
    # Headers:                    # optional request headers (Authorization, X-API-Key, ...)
    #   Authorization: "Bearer <token>"

  # Kind: asn — fetch all prefixes originated by an AS via RIPEstat (cached per ASN).
  # Optional Community tags the prefixes advertised from this source.
  - Kind: asn
    Name: cloudflare
    Description: "AS13335 Cloudflare Inc."
    Asn: 13335
    Community: "65444:101"

  - Kind: file
    Name: local
    Description: "Local override list"
    Path: "extra.txt"
    Community: "65444:100"

# Name of the source served as the RU/default set for unconfigured peers.
DefaultPrefixSource: ru

# Optional overrides for the static communities stamped on per-peer custom categories.
# Defaults: custom prefixes → "<Asn>:100", custom AS-originated prefixes → "<Asn>:200".
# CustomPrefixCommunity: "65444:100"
# CustomAsnCommunity: "65444:200"

# Management API — client-IP resolution behind a reverse proxy (#91).
# X-Forwarded-For / X-Real-IP are honored ONLY when the immediate TCP peer is one of these trusted
# CIDRs; otherwise the direct RemoteEndPoint is used and any client-supplied forwarding header is
# ignored (secure default). X-Forwarded-For is walked right-to-left past trusted hops, so spoofed
# entries injected on the left are defeated. When the API runs behind a reverse proxy, list the
# proxy's CIDR here so /api/me (and future per-IP rate limiting, #116) see the real client.
# Empty/absent = never trust forwarding headers.
# TrustedProxies:
#   - "127.0.0.0/8"
#   - "10.0.0.0/8"

# Management API — per-client-IP rate limiting (#116). Opt-in: absent = no limiting (live behavior
# unchanged). When present, each resolved client IP (via TrustedProxies) gets a token bucket; a
# request is rejected with 429 once its bucket drains. Defaults are generous (normal management-API
# usage never trips them); set Enabled: false to turn off.
# ApiRateLimit:
#   Enabled: true
#   TokenLimit: 120            # burst capacity (default 120)
#   TokensPerPeriod: 120       # tokens replenished per period (default 120)
#   PeriodSeconds: 60          # replenishment period in seconds (default 60)
#   # Global concurrency cap (#119). Opt-in: default 0 = no cap (live behavior unchanged). When > 0,
#   # at most this many requests run at once across ALL clients; the next is rejected with 503 until an
#   # in-flight request completes. Bounds total resource use regardless of flood source (defense in
#   # depth with the per-IP rate, which only bounds flood speed per client).
#   MaxConcurrentRequests: 0   # e.g. 32 to cap in-flight work (default 0 = unlimited)

# Management API — CORS origin allowlist (#99). A request's Origin header is reflected back as
# Access-Control-Allow-Origin ONLY when it matches an entry here (case-insensitive); otherwise no
# CORS headers are emitted and the browser blocks the cross-origin request. The previous blanket
# "Access-Control-Allow-Origin: *" on every response was a drive-by CSRF hole on the unauthenticated
# mutating routes. Empty/absent = CORS fully disabled (secure default — consistent with
# TrustedProxies opt-in). List the operator/frontend origins to enable cross-origin browser access.
# CorsAllowedOrigins:
#   - "https://operator.example.com"
#   - "https://bgp.example.net"

